name: Build Android Projeto GTA

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar NDK 26
        run: |
          sdkmanager "ndk;28.0.13004108" # Versão estável do NDK 26
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Dar permissão ao Gradle
        run: chmod +x gradlew

      - name: Compilar APK INICIANDO (.so)
        run: ./gradlew assembleRelease

      - name: Upando o apl
        uses: actions/upload-artifact@v4
        with:
          name: gta-mobile-build
          path: app/build/outputs/apk/**/*.apk
